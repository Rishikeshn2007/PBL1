<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CKD Health Assessment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main class="auth-container">
        <section class="auth-wrapper">
            <div class="form-header">
                <a class="header-link" href="{{ url_for('home') }}">Home</a>
                <h1>Login</h1>
                <p>Access your CKD health assessment account</p>
            </div>

            <form class="auth-form" id="loginForm" method="POST" action="/login">
                <div id="authMessage" class="auth-message" aria-live="polite"></div>

                <div class="form-group">
                    <label for="user_name">Username <span class="required">*</span></label>
                    <input type="text" id="user_name" name="user_name" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
            </form>

            <p class="auth-switch">
                New user?
                <a href="{{ url_for('register') }}">Create an account</a>
            </p>
        </section>
    </main>
    <script src="{{ url_for('static', filename='auth.js') }}"></script>
</body>
</html>
