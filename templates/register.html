<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - CKD Health Assessment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="auth-container">
        <section class="auth-wrapper">
            <div class="form-header">
                <a class="header-link" href="{{ url_for('home') }}">Home</a>
                <h1>Registration</h1>
                <p>Create an account to use the CKD assessment site</p>
            </div>

            <form class="auth-form" id="registerForm" method="POST" action="/register">
                <div id="authMessage" class="auth-message" aria-live="polite"></div>

                <div class="form-group">
                    <label for="user_name">Username <span class="required">*</span></label>
                    <input type="text" id="user_name" name="user_name" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                </div>

                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Register</button>
                </div>
            </form>

            <p class="auth-switch">
                Already have an account?
                <a href="{{ url_for('login') }}">Login here</a>
            </p>
        </section>
    </main>
    <script src="{{ url_for('static', filename='auth.js') }}"></script>
</body>
</html>
